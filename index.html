          {
            "@type": "Question",
            "name": "What kind of businesses benefit from custom AI agents?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Businesses with high-volume, repeatable workflows across internal systems benefit most from custom AI agents. Resonance builds AI agents for teams that need faster work across CRM, ERP, support tools, and proprietary knowledge systems, especially when manual routing, review, and follow-up are slowing operations."
            }
          },
          {
            "@type": "Question",
            "name": "How do you integrate AI with CRM, ERP, or support systems?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We integrate AI by connecting agents and workflow automation directly to the systems your teams already use. That usually means combining API access, business rules, and review paths so AI can retrieve context, draft actions, update records, and hand work back to people inside CRM, ERP, support tools, and internal applications."
            }
          },
          {
            "@type": "Question",
            "name": "When should a company use a domain-tuned model instead of a generic model?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "A domain-tuned model makes sense when generic models do not reliably match your workflows, language, or decision standards. Resonance uses domain-tuned and fine-tuned models when teams need stronger accuracy on proprietary terminology, structured business logic, or repeatable judgments that affect operations, compliance, or customer experience."
            }
          },
          {
            "@type": "Question",
            "name": "How do you keep AI workflows reliable and reviewable in production?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We keep AI workflows reliable by adding observability, evals, controls, and human review where the process requires it. Production AI systems need more than prompts, so we design review paths, fallback logic, logging, and monitoring around live workflows to make outputs traceable, measurable, and safer to run inside real operations."
            }
          },
          {
            "@type": "Question",
            "name": "How long does it take to launch an AI workflow automation project?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Launch timing depends on workflow complexity, integration depth, and review requirements, but the first production use case should be narrow and measurable. The process starts by identifying the highest-value workflow, validating it in production conditions, and then deploying with observability and controls, which keeps time-to-value focused on one operational bottleneck instead of a broad transformation program."
            }
          },
          {
            "@type": "Question",
            "name": "How do you measure ROI from AI automation?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We measure AI automation ROI against the operational metric the workflow is supposed to improve. Typical metrics include reduced manual handling time, faster response or approval cycles, lower error rates, improved throughput, and cleaner pipeline or case management across CRM, ERP, support, and internal process work."
            }
          },
          {
            "@type": "Question",
            "name": "Do you build with human review and approval steps?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, we build review and approval steps into AI systems whenever the workflow needs oversight, escalation, or sign-off. That includes approval gates for sensitive actions, exception handling for uncertain outputs, and escalation paths that let teams keep control while still automating the repetitive parts of the workflow."
            }
          }
        ]
